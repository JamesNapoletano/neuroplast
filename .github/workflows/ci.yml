name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 18
            smoke: false
          - os: ubuntu-latest
            node: 20
            smoke: true
          - os: ubuntu-latest
            node: 22
            smoke: false
          - os: windows-latest
            node: 20
            smoke: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Verify CLI help
        shell: pwsh
        run: node ./bin/neuroplast.js --help

      - name: Run release verification
        shell: pwsh
        run: npm run release:verify
